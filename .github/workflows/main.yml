name: Laravel CI/CD Pipeline

# Trigger the workflow on push to main branch or pull request
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up PHP
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Use the PHP version your Laravel project requires
          extensions: mbstring, dom, fileinfo, mysql, sqlite, curl # Add required extensions
          coverage: pcov # Optional: For code coverage

      # Install Composer dependencies
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      # Install NPM dependencies (if using Laravel Mix or Vite)
      - name: Install NPM dependencies
        run: npm install

      # Build assets (if using Laravel Mix or Vite)
      - name: Build assets
        run: npm run build

      # Run migrations and seeders (optional)
      #- name: Run migrations
      #  run: php artisan migrate --force

  deploy:
    runs-on: ubuntu-latest
    #needs: test
    if: github.ref == 'refs/heads/main' # Only deploy on main branch

    steps:
      # Configure Git SSH
      - name: Configure Git SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_cicd
          chmod 600 ~/.ssh/id_rsa_cicd
          ssh-keyscan github.com >> ~/.ssh/known_hosts
        # Add deployment commands here (e.g., SSH into server, deploy scripts, etc.)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 2222
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          #passphrase: 1234
          # fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          #git remote set-url origin git@github.com:hazreemahmood/my-laravel-app.git
            #ssh -T git@github.com
            #passphrase: 12345
            #cd /var/www/html/my-laravel-app
            #git pull
            #php artisan optimize:clear
            #inside script
          script: |
            eval "$(ssh-agent -s)"
            ssh-add ~/.ssh/id_rsa_cicd
            cd /var/www/html/my-laravel-app
            git pull origin main
              php artisan optimize:clear
              php artisan migrate
              php artisan db:seed --force

      # Send Discord notification on deployment success
      - name: Discord notification - Deployment success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "username": "CI/CD Bot",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "embeds": [{
              "title": "✅ Deployment Successful",
              "description": "Your Laravel app has been deployed successfully via CI/CD.",
              "color": 5763719,
              "fields": [
                { "name": "Repository", "value": "hazreemahmood/my-laravel-app", "inline": true },
                { "name": "Branch", "value": "main", "inline": true },
                { "name": "Commit", "value": "'"${{ github.sha }}"'", "inline": false }
              ],
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }]
          }' "${{ secrets.DISCORD_WEBHOOK_URL }}"
      # Send Discord notification on deployment failure
      - name: Discord notification - Deployment failed
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "username": "CI/CD Bot",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "embeds": [{
              "title": "❌ Deployment Failed",
              "description": "Your Laravel app deployment has failed. Check GitHub Actions for details.",
              "color": 15548997,
              "fields": [
                { "name": "Repository", "value": "hazreemahmood/my-laravel-app", "inline": true },
                { "name": "Branch", "value": "main", "inline": true },
                { "name": "Commit", "value": "'"${{ github.sha }}"'", "inline": false },
                { "name": "Link", "value": "[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
              ],
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }]
          }' "${{ secrets.DISCORD_WEBHOOK_URL }}"
